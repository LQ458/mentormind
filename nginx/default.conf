upstream frontend {
    server frontend:3000;
    keepalive 64;
}

upstream backend {
    server backend:8000;
    keepalive 64;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ── WebSocket for board streaming ─────────────────────────────────────────
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Backend media files ──────────────────────────────────────────────────
    location /media/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Media proxy cache for external images ────────────────────────────────
    # Backend rewrites Unsplash / Wikipedia / Pixabay URLs to
    # /media-proxy/?url=<encoded_url>&sig=<hmac_signature>
    location /media-proxy/ {
        proxy_cache media_cache;
        proxy_cache_key "$arg_url";
        proxy_cache_valid 200 7d;
        proxy_cache_valid 301 302 1h;
        proxy_cache_valid 404 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        proxy_cache_background_update on;

        proxy_ignore_headers Cache-Control Expires Set-Cookie;

        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=604800, immutable";

        proxy_pass $arg_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Only allow proxying to whitelisted image hosts
        set $allowed '';
        if ($arg_url ~* "^https?://(upload\.wikimedia\.org|images\.unsplash\.com|pixabay\.com)") {
            set $allowed '1';
        }
        if ($allowed != '1') {
            return 403;
        }

        proxy_pass $arg_url;
    }

    # ── Frontend (Next.js) ───────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
