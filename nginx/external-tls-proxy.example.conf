# Example VPS-level TLS nginx config for mentormind.cloud.
#
# Use this only when TLS is terminated by a host-level nginx or a separate
# nginx-proxy container instead of the bundled `mentormind-nginx` service.
# The key production requirement is that `/ws/` must reach the FastAPI
# WebSocket endpoint with Upgrade headers preserved. The production compose
# publishes the backend on 127.0.0.1:8000 by default for this purpose.
# If `/ws/` proxies to the Next.js frontend, board lessons fail in the browser
# with a generic "WebSocket connection failed" error.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name mentormind.cloud;

    # ssl_certificate /etc/letsencrypt/live/mentormind.cloud/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mentormind.cloud/privkey.pem;

    client_max_body_size 1024m;
    client_body_timeout 300s;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /ws/ {
        # Requires BACKEND_BIND=127.0.0.1 and BACKEND_PORT=8000 from
        # docker-compose.prod.yml. If you do not publish the backend loopback
        # port, proxy this location to the bundled mentormind-nginx HTTP port
        # instead, because that container already routes /ws/ to backend:8000.
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
