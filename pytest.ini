[pytest]
# ── MentorMind test configuration ─────────────────────────────────────────
testpaths = tests
asyncio_mode = auto

# Verbose output with short traceback for CI
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Custom marks
markers =
    asyncio: async test (handled by pytest-asyncio)
    integration: requires live services (skip in unit CI)
    slow: test takes > 5 s

# Do not collect the legacy scripts
collect_ignore = ["tests/scripts/repro_manim_correction.py"]
