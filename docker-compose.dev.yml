services:
  frontend:
    # Use development mode instead of production build
    build:
      context: ./web
      target: deps
    command: pnpm dev
    
    # Mount the local web directory into the container for instant hot-reloading
    # The /app/node_modules anonymous volume protects the container's node_modules
    # from being overwritten by the host's (which might be empty or incompatible).
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next

    # Disable production environment restrictions
    environment:
      NODE_ENV: development
      # Still ensure the Clerk keys pass through
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    env_file:
      - .env

  backend:
    # Use uvicorn reload for instant backend updates
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PRELOAD_ASR_LANG: none
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data

  celery-worker:
    # Use watchdog/monitoring if available, or just volume mounts
    # Re-running the command with volumes ensures worker sees code changes
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
