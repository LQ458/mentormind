services:
  frontend:
    # Use development mode instead of production build
    command: pnpm dev
    
    # Mount the local web directory into the container for instant hot-reloading
    # Skip mounting node_modules or .next to prevent overriding container internals
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next 

    # Disable production environment restrictions
    environment:
      NODE_ENV: development
      # Still ensure the Clerk keys pass through
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    env_file:
      - .env

  backend:
    # Use uvicorn reload for instant backend updates
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data

  celery-worker:
    # Use watchdog/monitoring if available, or just volume mounts
    # Re-running the command with volumes ensures worker sees code changes
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
