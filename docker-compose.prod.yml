name: mentormind-prod

x-backend-image: &backend_image mentormind-backend:${MENTORMIND_IMAGE_TAG:-prod}

# Bound container log growth so logs cannot fill the VPS disk. Docker's default
# json-file driver has no rotation; this caps each container to 20m x 5 files.
x-logging: &default_logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-backend-env: &backend_env
  MENTORMIND_ENV: ${MENTORMIND_ENV:-production}
  MENTORMIND_BUILD_SHA: ${MENTORMIND_BUILD_SHA:-}
  MENTORMIND_IMAGE_TAG: ${MENTORMIND_IMAGE_TAG:-prod}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_USER: ${POSTGRES_USER:-mentormind}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mentormind}
  DATABASE_URL: postgresql://${POSTGRES_USER:-mentormind}:${POSTGRES_PASSWORD:-mentormind}@postgres:5432/${POSTGRES_DB:-mentormind_metadata}
  CELERY_BROKER_URL: redis://redis:6379/0
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
  MENTORMIND_ADMIN_USERS: ${MENTORMIND_ADMIN_USERS:-}
  PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
  NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
  SEMINAR_ASR_TIMEOUT_SECONDS: ${SEMINAR_ASR_TIMEOUT_SECONDS:-90}
  UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
  PIXABAY_API_KEY: ${PIXABAY_API_KEY:-}
  HEYGEN_API_KEY: ${HEYGEN_API_KEY:-}
  VOLC_TTS_APPID: ${VOLC_TTS_APPID:-}
  VOLC_TTS_TOKEN: ${VOLC_TTS_TOKEN:-}
  CORS_ORIGINS: ${CORS_ORIGINS:-}
  VERIFY_SSL: ${VERIFY_SSL:-true}
  TEST_BYPASS_SECRET: ${TEST_BYPASS_SECRET:-}
  S3_ENABLED: ${S3_ENABLED:-false}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME:-mentormind-videos}
  S3_PUBLIC_URL_PREFIX: ${S3_PUBLIC_URL_PREFIX:-}
  PRELOAD_ASR_LANG: ${PRELOAD_ASR_LANG:-en}
  # Board lesson pacing (v2). Defaults match backend/config/config.py.
  BOARD_PACING_MODE: ${BOARD_PACING_MODE:-learner_paced}
  BOARD_SEGMENT_MAX_ELEMENTS: ${BOARD_SEGMENT_MAX_ELEMENTS:-4}
  BOARD_SEGMENT_MIN_ELEMENTS: ${BOARD_SEGMENT_MIN_ELEMENTS:-2}
  BOARD_ADAPTIVE_INVITE_EVERY_N_SEGMENTS: ${BOARD_ADAPTIVE_INVITE_EVERY_N_SEGMENTS:-3}
  BOARD_ADAPTIVE_STRUGGLE_INVITE_EVERY_N: ${BOARD_ADAPTIVE_STRUGGLE_INVITE_EVERY_N:-1}
  BOARD_ADAPTIVE_FADE_AFTER_OK: ${BOARD_ADAPTIVE_FADE_AFTER_OK:-2}
  BOARD_FAST_MODE: ${BOARD_FAST_MODE:-}

services:
  postgres:
    image: postgres:15-alpine
    container_name: mentormind-postgres
    restart: unless-stopped
    logging: *default_logging
    mem_limit: ${POSTGRES_MEM_LIMIT:-1500m}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mentormind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mentormind}
      POSTGRES_DB: ${POSTGRES_DB:-mentormind_metadata}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mentormind} -d ${POSTGRES_DB:-mentormind_metadata}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mentormind-net

  redis:
    image: redis:7-alpine
    container_name: mentormind-redis
    restart: unless-stopped
    logging: *default_logging
    mem_limit: ${REDIS_MEM_LIMIT:-512m}
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mentormind-net

  backend:
    image: *backend_image
    build:
      context: ./backend
    container_name: mentormind-backend
    restart: unless-stopped
    logging: *default_logging
    mem_limit: ${BACKEND_MEM_LIMIT:-2g}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *backend_env
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
      - modelscope_cache:/root/.cache/modelscope
      - whisper_cache:/root/.cache/whisper
      - paddleocr_cache:/root/.paddleocr
    command: sh -c "python migrate_db.py && uvicorn server:app --host 0.0.0.0 --port 8000"
    expose:
      - "8000"
    ports:
      # Loopback-only so a host-level TLS nginx can proxy /ws/ to the FastAPI
      # WebSocket endpoints without exposing the backend directly to the public net.
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - mentormind-net

  celery-orchestration:
    image: *backend_image
    container_name: mentormind-celery-orchestration
    restart: unless-stopped
    logging: *default_logging
    mem_limit: ${CELERY_ORCH_MEM_LIMIT:-1g}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      <<: *backend_env
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
    command: celery -A celery_app worker --loglevel=info --concurrency=4 -Q orchestration
    healthcheck:
      # Detect a wedged worker (alive process but not consuming). Targeted at the
      # local node (celery@$HOSTNAME) so a healthy sibling cannot mask a stuck one.
      # $$ escapes compose interpolation; the container shell expands $HOSTNAME.
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 90s
    networks:
      - mentormind-net

  celery-rendering:
    image: *backend_image
    container_name: mentormind-celery-rendering
    restart: unless-stopped
    logging: *default_logging
    mem_limit: ${CELERY_RENDER_MEM_LIMIT:-2g}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      <<: *backend_env
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
    command: celery -A celery_app worker --loglevel=info --concurrency=1 -Q rendering
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 90s
    networks:
      - mentormind-net

  celery-heavy-ml:
    image: *backend_image
    container_name: mentormind-celery-heavy-ml
    restart: unless-stopped
    logging: *default_logging
    mem_limit: ${CELERY_HEAVYML_MEM_LIMIT:-3500m}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      <<: *backend_env
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
      - modelscope_cache:/root/.cache/modelscope
      - whisper_cache:/root/.cache/whisper
      - paddleocr_cache:/root/.paddleocr
    command: celery -A celery_app worker --loglevel=info --concurrency=2 -Q heavy_ml
    healthcheck:
      # heavy_ml loads large ASR/OCR models; allow a long start_period before health counts.
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME -t 15 >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 25s
      retries: 3
      start_period: 180s
    networks:
      - mentormind-net

  frontend:
    image: mentormind-frontend:${MENTORMIND_IMAGE_TAG:-prod}
    build:
      context: ./web
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
        NEXT_PUBLIC_BACKEND_WS_URL: ${NEXT_PUBLIC_BACKEND_WS_URL:-}
        NEXT_PUBLIC_AUDIO_INGEST_POLL_MINUTES: ${NEXT_PUBLIC_AUDIO_INGEST_POLL_MINUTES:-30}
        NEXT_PUBLIC_BUILD_SHA: ${MENTORMIND_BUILD_SHA:-}
        NEXT_PUBLIC_IMAGE_TAG: ${MENTORMIND_IMAGE_TAG:-prod}
        ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-}
    container_name: mentormind-frontend
    restart: unless-stopped
    logging: *default_logging
    mem_limit: ${FRONTEND_MEM_LIMIT:-768m}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_URL: http://mentormind-backend:8000
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_DB_URL: postgresql://${POSTGRES_USER:-mentormind}:${POSTGRES_PASSWORD:-mentormind}@postgres:5432/${POSTGRES_DB:-mentormind_metadata}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
      NEXT_PUBLIC_BACKEND_WS_URL: ${NEXT_PUBLIC_BACKEND_WS_URL:-}
      NEXT_PUBLIC_AUDIO_INGEST_POLL_MINUTES: ${NEXT_PUBLIC_AUDIO_INGEST_POLL_MINUTES:-30}
      NEXT_PUBLIC_BUILD_SHA: ${MENTORMIND_BUILD_SHA:-}
      NEXT_PUBLIC_IMAGE_TAG: ${MENTORMIND_IMAGE_TAG:-prod}
      SEMINAR_AUDIO_TIMEOUT_MS: ${SEMINAR_AUDIO_TIMEOUT_MS:-120000}
      SEMINAR_TURN_TIMEOUT_MS: ${SEMINAR_TURN_TIMEOUT_MS:-90000}
    expose:
      - "3000"
    ports:
      # The public entrypoint should be nginx. Keep raw Next.js local to the VPS.
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      # node:20-alpine ships a global fetch(); avoids depending on curl/wget being present.
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mentormind-net

  nginx:
    image: mentormind-nginx:${MENTORMIND_IMAGE_TAG:-prod}
    build:
      context: ./nginx
    container_name: mentormind-nginx
    restart: unless-stopped
    logging: *default_logging
    mem_limit: ${NGINX_MEM_LIMIT:-256m}
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - nginx_cache:/var/cache/nginx/media_proxy
    networks:
      - mentormind-net

networks:
  mentormind-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_data:
  backend_logs:
  modelscope_cache:
  whisper_cache:
  paddleocr_cache:
  nginx_cache:
