<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e1b4b" />
    <title>MentorMind Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --surface: #fff;
        --ink: #0b1220;
        --muted: #5c6a82;
        --line: #e6e9ef;
        --accent: #315fa8;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(520px, calc(100vw - 40px));
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 8px 28px rgba(11, 18, 32, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        line-height: 1.2;
        font-weight: 600;
      }
      p {
        color: var(--muted);
        line-height: 1.6;
        margin: 0 0 18px;
      }
      a {
        display: inline-flex;
        color: #fff;
        background: var(--accent);
        border-radius: 8px;
        padding: 10px 14px;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>MentorMind can reopen cached pages, but live generation and saving need a connection.</p>
      <a href="/today">Return to daily review</a>
    </main>
  </body>
</html>
