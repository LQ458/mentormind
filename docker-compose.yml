
services:
  postgres:
    image: postgres:15-alpine
    container_name: mentormind-postgres
    environment:
      POSTGRES_USER: mentormind
      POSTGRES_PASSWORD: mentormind
      POSTGRES_DB: mentormind_metadata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mentormind -d mentormind_metadata" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mentormind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: mentormind-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: mentormind-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: mentormind
      POSTGRES_PASSWORD: mentormind
      DATABASE_URL: postgresql://mentormind:mentormind@mentormind-postgres:5432/mentormind_metadata
      CELERY_BROKER_URL: redis://redis:6379/0
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      S3_ENABLED: ${S3_ENABLED:-false}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-mentormind-videos}
      S3_PUBLIC_URL_PREFIX: ${S3_PUBLIC_URL_PREFIX:-}
      PRELOAD_ASR_LANG: ${PRELOAD_ASR_LANG:-en}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - modelscope_cache:/root/.cache/modelscope
    command: uvicorn server:app --host 0.0.0.0 --port 8000

  celery-worker:
    build: ./backend
    container_name: mentormind-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: mentormind-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: mentormind
      POSTGRES_PASSWORD: mentormind
      DATABASE_URL: postgresql://mentormind:mentormind@mentormind-postgres:5432/mentormind_metadata
      CELERY_BROKER_URL: redis://redis:6379/0
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      S3_ENABLED: ${S3_ENABLED:-false}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-mentormind-videos}
      S3_PUBLIC_URL_PREFIX: ${S3_PUBLIC_URL_PREFIX:-}
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - modelscope_cache:/root/.cache/modelscope
    command: celery -A celery_app worker --loglevel=info --concurrency=4

  frontend:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    container_name: mentormind-frontend
    depends_on:
      - backend
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: '/'
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: '/'
      # Point to the backend running on the host machine if needed
      BACKEND_URL: http://host.docker.internal:8000
      # Pass ALLOWED_ORIGIN from host .env variable to Next.js payload for CSRF check
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-}
      # Tells Next.js its own public-facing URL so Server Actions origin checks pass
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"

